    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"

    <title>Document</title>
    <style>
        .spinner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;

        }
    </style>

<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-6 offset-md-3 mb-4">
                <div class="card">
                    <div class="card-body">
                        <form id="postForm">
                            <div class="form-group">
                                <label for="title">Title</label>
                                <input type="text" id="title" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="body">Body</label>
                                <textarea id="body" rows="4" class="form-control"></textarea>
                            </div>
                            <div class="form-group">
                                <label for="userId">User Id</label>
                                <select id="userId" class="form-control">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                    <option value="10">10</option>
                                </select>
                            </div>
                            <button id="addBtn" class="btn btn-outline-primary btn-block btn-sm">Add Post</button>
                            <button type="button" id="updateBtn"
                                class="btn btn-outline-danger btn-block btn-sm d-none">Update Post</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="row" id="postContainer">

        <div class="spinner-border text-primary" role="status">

        </div>
